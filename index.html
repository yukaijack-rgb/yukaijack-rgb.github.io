<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live2D 建模報價試算</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-info: #e6f1fb;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-success: #0f6e56;
    --text-info: #185fa5;
    --border-subtle: rgba(0,0,0,0.12);
    --border-medium: rgba(0,0,0,0.22);
    --border-info: #378add;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #FFFFFF;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 780px;
    margin: 0 auto;
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    padding: 2rem 2rem 2.5rem;
    border: 0.5px solid var(--border-subtle);
  }
  .top-bar {
    display: flex;
    justify-content: flex-end;
    gap: 4px;
    margin-bottom: 1.5rem;
  }
  .lang-btn {
    padding: 4px 12px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-medium);
    background: var(--bg-primary);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    font-family: inherit;
  }
  .lang-btn:hover { background: var(--bg-secondary); }
  .lang-btn.active { background: var(--text-primary); color: #ffffff; border-color: var(--text-primary); }
  h1 { font-size: 22px; font-weight: 500; color: var(--text-primary); margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 2rem; }
  .sec-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-secondary); margin-bottom: 12px;
  }
  .pkg-grid {
    display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px; margin-bottom: 2rem;
  }
  @media (max-width: 520px) {
    .pkg-grid { grid-template-columns: 1fr; }
    .container { padding: 1.25rem 1rem 2rem; }
  }
  .pkg-card {
    background: var(--bg-primary); border: 0.5px solid var(--border-subtle);
    border-radius: var(--radius-lg); padding: 1rem 1.1rem;
    cursor: pointer; transition: border-color 0.15s;
  }
  .pkg-card.selected { border: 2px solid var(--border-info); }
  .pkg-badge {
    font-size: 11px; background: var(--bg-info); color: var(--text-info);
    padding: 2px 8px; border-radius: var(--radius-md);
    display: inline-block; margin-bottom: 8px;
  }
  .pkg-name { font-size: 17px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
  .pkg-name-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 6px; }
  .pkg-name-row .pkg-name { margin-bottom: 0; }
  :lang(ja) .pkg-name { font-size: 14px; }
  :lang(ja) .pkg-badge { font-size: 10px; padding: 2px 6px; }
  :lang(en) .pkg-name { font-size: 14px; }
  :lang(en) .pkg-badge { font-size: 10px; padding: 2px 6px; }
  .pkg-price { font-size: 20px; font-weight: 500; color: var(--text-primary); margin-bottom: 10px; }
  .pkg-price span { font-size: 12px; font-weight: 400; color: var(--text-secondary); }
  .pkg-feature { font-size: 12px; color: var(--text-secondary); line-height: 1.9; }
  .pkg-feature .dot {
    display: inline-block; width: 4px; height: 4px; border-radius: 50%;
    background: var(--text-secondary); margin-right: 6px; vertical-align: middle;
  }
  .addon-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-primary); border: 0.5px solid var(--border-subtle);
    border-radius: var(--radius-md); padding: 9px 12px;
    margin-bottom: 6px; transition: border-color 0.12s; user-select: none;
  }
  .addon-row.selected { border: 2px solid var(--border-info); background: var(--bg-info); }
  .addon-row.included { opacity: 0.6; }
  .addon-cb { width: 15px; height: 15px; flex-shrink: 0; accent-color: var(--border-info); cursor: pointer; }
  .addon-name { flex: 1; font-size: 13px; color: var(--text-primary); }
  .addon-note { font-size: 11px; color: var(--text-secondary); margin-left: 4px; }
  .addon-price { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; min-width: 90px; text-align: right; }
  .included-label { font-size: 12px; color: var(--text-success); font-weight: 500; white-space: nowrap; }
  .na-label { font-size: 12px; color: var(--text-secondary); }
  .qty-ctrl { display: none; align-items: center; gap: 6px; flex-shrink: 0; }
  .qty-ctrl.visible { display: flex; }
  .qty-btn {
    width: 24px; height: 24px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-medium); background: var(--bg-primary);
    color: var(--text-primary); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1; font-family: inherit;
  }
  .qty-btn:active { transform: scale(0.95); }
  .qty-num { font-size: 13px; font-weight: 500; color: var(--text-primary); min-width: 16px; text-align: center; }
  .summary-card { background: #daf5f5; border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .sum-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); padding: 3px 0; }
  .sum-total {
    display: flex; justify-content: space-between; font-size: 18px; font-weight: 500;
    color: var(--text-primary); border-top: 0.5px solid var(--border-subtle);
    margin-top: 10px; padding-top: 12px;
  }
  .copy-btn {
    width: 100%; padding: 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-medium); background: var(--bg-primary);
    color: var(--text-primary); font-size: 13px; cursor: pointer;
    margin-bottom: 1.5rem; transition: background 0.12s; font-family: inherit;
  }
  .copy-btn:hover { background: var(--bg-secondary); }
  .copy-btn:active { transform: scale(0.98); }
  .note { font-size: 12px; color: var(--text-secondary); line-height: 1.9; }
  .no-pkg { font-size: 12px; color: var(--text-secondary); padding: 6px 0; font-style: italic; }
  .divider { border: none; border-top: 0.5px solid var(--border-subtle); margin: 1.75rem 0; }
</style>
</head>

const CURRENCY = {
  zh: { symbol: 'NT$', rate: 1,    decimals: 0 },
  en: { symbol: 'US$', rate: 1/30, decimals: 2 },
  ja: { symbol: '¥',   rate: 1/0.2,decimals: 0 },
};

function fmtPrice(ntAmt, lang) {
  const c = CURRENCY[lang];
  const converted = ntAmt * c.rate;
  const rounded = c.decimals === 0 ? Math.round(converted) : Math.round(converted * 100) / 100;
  return c.symbol + rounded.toLocaleString(undefined, {
    minimumFractionDigits: c.decimals,
    maximumFractionDigits: c.decimals,
  });
}

// ── 狀態 ────────────────────────────────────────────
let currentLang = 'zh';
let selectedPkg = -1;
const state = {};
ADDONS.forEach(a => { state[a.key] = { checked: false, qty: 1 }; });

// ── 工具 ─────────────────────────────────────────────
function t(key) { return I18N[currentLang][key] ?? I18N.zh[key] ?? key; }

function parsePrice(raw) {
  if (!raw || raw === 'na' || raw === 'included') return null;
  const up = raw.includes('up');
  const n = parseInt(raw);
  return isNaN(n) ? null : { val: n, up };
}

function renderAmt(ntVal, isUp) {
  return fmtPrice(ntVal, currentLang) + (isUp ? '+' : '');
}

// ── 語言切換 ─────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  applyLang();
}

function applyLang() {
  const L = I18N[currentLang];
  document.getElementById('page-title').textContent     = L.page_title;
  document.getElementById('subtitle').textContent       = L.subtitle;
  document.getElementById('label-package').textContent  = L.label_package;
  document.getElementById('label-addon').textContent    = L.label_addon;
  document.getElementById('label-estimate').textContent = L.label_estimate;
  document.getElementById('badge-recommend').textContent= L.badge_recommend;
  document.getElementById('label-total').textContent    = L.label_total;
  document.getElementById('btn-copy').textContent       = L.btn_copy;
  document.getElementById('note-block').innerHTML       = L.notes.map(n=>`✦ ${n}`).join('<br>');

  // 套餐名稱、價格、功能
  for (let i = 0; i < 3; i++) {
    document.getElementById(`pkg-${i}-name`).textContent = L.pkg_names[i];
    const ntPrice = L.pkg_prices_nt[i];
    document.getElementById(`pkg-${i}-price`).innerHTML =
      `${fmtPrice(ntPrice, currentLang)} <span>+</span>`;
    document.getElementById(`pkg-${i}-features`).innerHTML =
      L.pkg_features[i].map(f=>`<div><span class="dot"></span>${f}</div>`).join('');
  }

  // 加購項目文字更新（不重建 DOM，保留選取狀態）
  ADDONS.forEach(a => {
    const nameEl = document.querySelector(`#ar-${a.key} .addon-name`);
    if (nameEl) {
      const label = a[currentLang] || a.zh;
      const noteText = a.note ? (a.note[currentLang] || a.note.zh) : '';
      nameEl.innerHTML = label + (noteText ? `<span class="addon-note">${noteText}</span>` : '');
    }
    renderAddonPrice(a.key);
  });

  updateSummary();
}

// ── 加購項目建構（僅首次）────────────────────────────
function buildAddonHTML() {
  document.getElementById('addonList').innerHTML = ADDONS.map(a => {
    const label    = a[currentLang] || a.zh;
    const noteText = a.note ? (a.note[currentLang] || a.note.zh) : '';
    const noteHtml = noteText ? `<span class="addon-note">${noteText}</span>` : '';
    const qtyHtml  = a.maxQty ? `
      <div class="qty-ctrl" id="qc-${a.key}">
        <button class="qty-btn" onclick="changeQty(event,'${a.key}',-1)">−</button>
        <span class="qty-num" id="qn-${a.key}">1</span>
        <button class="qty-btn" onclick="changeQty(event,'${a.key}',1)">+</button>
      </div>` : '';
    return `<div class="addon-row" id="ar-${a.key}" data-key="${a.key}">
      <input type="checkbox" class="addon-cb" id="cb-${a.key}" onchange="onCheckChange('${a.key}')">
      <span class="addon-name">${label}${noteHtml}</span>
      ${qtyHtml}
      <span class="addon-price" id="ap-${a.key}">—</span>
    </div>`;
  }).join('');
}

function renderAddonPrice(key) {
  const a   = ADDONS.find(x => x.key === key);
  const el  = document.getElementById('ap-' + key);
  const row = document.getElementById('ar-' + key);
  if (!a || !el || !row) return;
  if (selectedPkg === -1) { el.textContent = '—'; row.classList.remove('included'); return; }
  const raw = a.prices[selectedPkg];
  if (raw === 'included') {
    el.innerHTML = `<span class="included-label">${t('status_included')}</span>`;
    row.classList.add('included');
    deselect(key); return;
  }
  row.classList.remove('included');
  if (raw === 'na') {
    el.innerHTML = `<span class="na-label">${t('status_na')}</span>`;
    deselect(key); return;
  }
  const p = parsePrice(raw);
  if (!p || p.val === null) { el.textContent = '—'; return; }
  const qty = state[key].qty;
  const base = renderAmt(p.val, p.up);
  el.textContent = qty > 1 ? `${base} ×${qty}` : base;
}

function onCheckChange(key) {
  if (selectedPkg === -1) { document.getElementById('cb-' + key).checked = false; return; }
  const a   = ADDONS.find(x => x.key === key);
  const raw = a.prices[selectedPkg];
  if (raw === 'included' || raw === 'na') { document.getElementById('cb-' + key).checked = false; return; }
  const p = parsePrice(raw);
  if (!p || p.val === null) { document.getElementById('cb-' + key).checked = false; return; }
  const checked = document.getElementById('cb-' + key).checked;
  state[key].checked = checked;
  const row = document.getElementById('ar-' + key);
  const qc  = document.getElementById('qc-' + key);
  row.classList.toggle('selected', checked);
  if (qc) qc.classList.toggle('visible', checked);
  if (!checked) { state[key].qty = 1; const qn = document.getElementById('qn-' + key); if (qn) qn.textContent = '1'; }
  renderAddonPrice(key);
  updateSummary();
}

function changeQty(event, key, delta) {
  event.stopPropagation();
  const a = ADDONS.find(x => x.key === key);
  if (!a || !a.maxQty || !state[key].checked) return;
  state[key].qty = Math.min(a.maxQty, Math.max(1, state[key].qty + delta));
  document.getElementById('qn-' + key).textContent = state[key].qty;
  renderAddonPrice(key);
  updateSummary();
}

function deselect(key) {
  if (!state[key].checked) return;
  state[key].checked = false; state[key].qty = 1;
  const cb  = document.getElementById('cb-' + key);
  const row = document.getElementById('ar-' + key);
  const qc  = document.getElementById('qc-' + key);
  const qn  = document.getElementById('qn-' + key);
  if (cb)  cb.checked = false;
  if (row) row.classList.remove('selected');
  if (qc)  qc.classList.remove('visible');
  if (qn)  qn.textContent = '1';
}

function selectPkg(idx) {
  if (selectedPkg === idx) {
    selectedPkg = -1;
    document.getElementById('pkg-' + idx).classList.remove('selected');
  } else {
    document.querySelectorAll('.pkg-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('pkg-' + idx).classList.add('selected');
    selectedPkg = idx;
  }
  ADDONS.forEach(a => renderAddonPrice(a.key));
  updateSummary();
}

function updateSummary() {
  const container = document.getElementById('sumItems');
  const totalEl   = document.getElementById('totalPrice');
  let totalNT = 0, rows = '';

  if (selectedPkg !== -1) {
    const ntPrice = I18N[currentLang].pkg_prices_nt[selectedPkg];
    const name    = I18N[currentLang].pkg_names[selectedPkg];
    totalNT += ntPrice;
    rows += `<div class="sum-row"><span>${name}${t('suffix_base_pkg')}</span><span>${renderAmt(ntPrice, true)}</span></div>`;
  }

  ADDONS.forEach(a => {
    if (!state[a.key].checked || selectedPkg === -1) return;
    const raw = a.prices[selectedPkg];
    if (raw === 'included' || raw === 'na') return;
    const p = parsePrice(raw);
    if (!p || p.val === null) return;
    const qty      = state[a.key].qty;
    const subtotalNT = p.val * qty;
    totalNT += subtotalNT;
    const label    = a[currentLang] || a.zh;
    const qtyLabel = qty > 1 ? ` ×${qty}` : '';
    rows += `<div class="sum-row"><span>${label}${qtyLabel}</span><span>+${renderAmt(subtotalNT, p.up)}</span></div>`;
  });

  if (!rows) rows = `<div class="no-pkg">${t('msg_no_pkg')}</div>`;
  container.innerHTML = rows;
  totalEl.textContent = selectedPkg !== -1
    ? renderAmt(totalNT, true)
    : fmtPrice(0, currentLang);
}

function copyQuote() {
  if (selectedPkg === -1) { alert(t('alert_select')); return; }
  const pkgName  = I18N[currentLang].pkg_names[selectedPkg];
  const ntPrice  = I18N[currentLang].pkg_prices_nt[selectedPkg];
  let lines = [t('quote_title'), '', `${t('quote_package')}${pkgName}　${renderAmt(ntPrice, true)}`];
  let addonLines = [], totalNT = ntPrice;
  ADDONS.forEach(a => {
    if (!state[a.key].checked) return;
    const raw = a.prices[selectedPkg];
    if (raw === 'included' || raw === 'na') return;
    const p = parsePrice(raw);
    if (!p || p.val === null) return;
    const qty        = state[a.key].qty;
    const subtotalNT = p.val * qty;
    totalNT += subtotalNT;
    const label    = a[currentLang] || a.zh;
    const qtyLabel = qty > 1 ? ` ×${qty}` : '';
    addonLines.push(`・${label}${qtyLabel}　+${renderAmt(subtotalNT, p.up)}`);
  });
  if (addonLines.length > 0) { lines.push('', t('quote_addons')); addonLines.forEach(l => lines.push(l)); }
  lines.push('', `${t('quote_total')}${renderAmt(totalNT, true)}`, '', t('quote_disclaimer'));
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn  = document.getElementById('btn-copy');
    const orig = btn.textContent;
    btn.textContent = t('msg_copied');
    setTimeout(() => { btn.textContent = orig; }, 1800);
  }).catch(() => { prompt('', lines.join('\n')); });
}

// ── 初始化 ───────────────────────────────────────────
buildAddonHTML();
applyLang();
</script>
</body>
</html>
